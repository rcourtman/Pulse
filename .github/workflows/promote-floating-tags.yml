name: Promote Floating Tags
run-name: Promote Floating Tags ${{ inputs.tag }}

# Triggered automatically when publish-docker.yml completes, or manually
on:
  workflow_run:
    workflows: ["Publish Docker Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v6.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Is this a prerelease?'
        required: true
        type: boolean
        default: false

jobs:
  promote-images:
    runs-on: ubuntu-latest
    # Only run if workflow_dispatch OR if workflow_run completed successfully
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Extract tag from trigger
        id: extract
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual dispatch - use inputs directly
            TAG="${{ inputs.tag }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            # workflow_run trigger - extract from the triggering workflow's inputs
            # The publish-docker workflow was triggered with a tag input
            RUN_ID="${{ github.event.workflow_run.id }}"
            echo "Extracting inputs from workflow run ${RUN_ID}..."
            
            # Get the workflow run details to extract the tag
            WORKFLOW_DATA=$(gh api repos/${{ github.repository }}/actions/runs/${RUN_ID})
            TAG=$(echo "$WORKFLOW_DATA" | jq -r '.head_branch // ""')
            
            # If head_branch is main, we need to get it from the run's inputs
            # The inputs are stored in the run's display_title or we parse from artifacts
            if [ "$TAG" = "main" ] || [ -z "$TAG" ]; then
              # Try to get from run name which typically includes the tag
              TAG=$(echo "$WORKFLOW_DATA" | jq -r '.display_title' | grep -oP 'v\d+\.\d+\.\d+(-[a-zA-Z]+\.\d+)?' || echo "")
            fi
            
            if [ -z "$TAG" ]; then
              echo "::error::Could not extract tag from workflow_run"
              exit 1
            fi
            
            # Detect prerelease from tag
            if [[ "$TAG" =~ -rc\.[0-9]+$ ]] || [[ "$TAG" =~ -alpha\.[0-9]+$ ]] || [[ "$TAG" =~ -beta\.[0-9]+$ ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          fi
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT
          echo "Promoting floating tags for ${TAG} (prerelease: ${PRERELEASE})"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release line policy
        env:
          TAG: ${{ steps.extract.outputs.tag }}
          PRERELEASE: ${{ steps.extract.outputs.prerelease }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          REQUIRED_BRANCH="$(python3 scripts/release_control/control_plane.py --branch-for-version "${VERSION}")"

          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --prune --unshallow origin
          fi
          git fetch --prune origin "${REQUIRED_BRANCH}" --tags

          if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} does not exist in repository tags."
            exit 1
          fi

          TAG_COMMIT="$(git rev-list -n1 "refs/tags/${TAG}")"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/${REQUIRED_BRANCH}"; then
            echo "::error::Tag ${TAG} is not reachable from origin/${REQUIRED_BRANCH}. Refusing floating-tag promotion."
            exit 1
          fi

          if [ "$PRERELEASE" != "true" ]; then
            BASE_VERSION="${TAG#v}"
            BASE_VERSION="${BASE_VERSION%%-*}"
            mapfile -t RC_TAGS < <(git tag -l "v${BASE_VERSION}-rc.*" --sort=-version:refname)
            if [ "${#RC_TAGS[@]}" -eq 0 ]; then
              echo "::error::Stable tag ${TAG} has no matching RC tags for base version ${BASE_VERSION}."
              exit 1
            fi

            MATCHED_RC=""
            for rc_tag in "${RC_TAGS[@]}"; do
              rc_commit="$(git rev-list -n1 "refs/tags/${rc_tag}")"
              if git merge-base --is-ancestor "$rc_commit" "$TAG_COMMIT"; then
                MATCHED_RC="$rc_tag"
                break
              fi
            done

            if [ -z "$MATCHED_RC" ]; then
              echo "::error::Stable tag ${TAG} does not descend from any matching RC tag for base version ${BASE_VERSION}."
              exit 1
            fi

            echo "[OK] ${TAG} descends from prerelease ${MATCHED_RC}"
          fi

          echo "[OK] ${TAG} validated against release line ${REQUIRED_BRANCH}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Docker images to be available
        env:
          TAG: ${{ steps.extract.outputs.tag }}
        run: |
          echo "Waiting for Docker images with tag ${TAG} to be available..."
          MAX_ATTEMPTS=30
          ATTEMPT=0
          
          # Wait for main pulse image
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if docker manifest inspect rcourtman/pulse:${TAG} > /dev/null 2>&1; then
              echo "Image rcourtman/pulse:${TAG} is available!"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - pulse image not yet available, waiting 10s..."
            sleep 10
          done
          
          if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
            echo "Timeout waiting for pulse Docker image"
            exit 1
          fi
          
          # Also wait for unified agent image
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if docker manifest inspect rcourtman/pulse-agent:${TAG} > /dev/null 2>&1; then
              echo "Image rcourtman/pulse-agent:${TAG} is available!"
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - agent image not yet available, waiting 10s..."
            sleep 10
          done
          
          echo "Timeout waiting for agent Docker image"
          exit 1

      - name: Promote Pulse server image tags
        env:
          TAG: ${{ steps.extract.outputs.tag }}
          PRERELEASE: ${{ steps.extract.outputs.prerelease }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE_VERSION="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          MINOR=${MINOR:-0}
          MAJOR_MINOR="$MAJOR.$MINOR"

          if [ "$PRERELEASE" = "true" ]; then
            echo "Promoting prerelease tags for ${TAG}"
            docker buildx imagetools create \
              -t rcourtman/pulse:rc \
              rcourtman/pulse:${TAG}
            docker buildx imagetools create \
              -t ghcr.io/${OWNER}/pulse:rc \
              ghcr.io/${OWNER}/pulse:${TAG}
          else
            echo "Promoting stable tags for ${TAG}"
            docker buildx imagetools create \
              -t rcourtman/pulse:latest \
              -t rcourtman/pulse:${MAJOR_MINOR} \
              -t rcourtman/pulse:${MAJOR} \
              rcourtman/pulse:${TAG}
            docker buildx imagetools create \
              -t ghcr.io/${OWNER}/pulse:latest \
              -t ghcr.io/${OWNER}/pulse:${MAJOR_MINOR} \
              -t ghcr.io/${OWNER}/pulse:${MAJOR} \
              ghcr.io/${OWNER}/pulse:${TAG}
          fi

      - name: Promote Pulse agent image tags
        env:
          TAG: ${{ steps.extract.outputs.tag }}
          PRERELEASE: ${{ steps.extract.outputs.prerelease }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE_VERSION="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          MINOR=${MINOR:-0}
          MAJOR_MINOR="$MAJOR.$MINOR"

          if [ "$PRERELEASE" = "true" ]; then
            docker buildx imagetools create \
              -t rcourtman/pulse-agent:rc \
              rcourtman/pulse-agent:${TAG}
            docker buildx imagetools create \
              -t ghcr.io/${OWNER}/pulse-agent:rc \
              ghcr.io/${OWNER}/pulse-agent:${TAG}
          else
            docker buildx imagetools create \
              -t rcourtman/pulse-agent:latest \
              -t rcourtman/pulse-agent:${MAJOR_MINOR} \
              -t rcourtman/pulse-agent:${MAJOR} \
              rcourtman/pulse-agent:${TAG}
            docker buildx imagetools create \
              -t ghcr.io/${OWNER}/pulse-agent:latest \
              -t ghcr.io/${OWNER}/pulse-agent:${MAJOR_MINOR} \
              -t ghcr.io/${OWNER}/pulse-agent:${MAJOR} \
              ghcr.io/${OWNER}/pulse-agent:${TAG}
          fi

      - name: Promotion summary
        env:
          TAG: ${{ steps.extract.outputs.tag }}
          PRERELEASE: ${{ steps.extract.outputs.prerelease }}
        run: |
          VERSION="${TAG#v}"
          BASE_VERSION="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          MAJOR_MINOR="$MAJOR.${MINOR:-0}"
          
          if [ "$PRERELEASE" = "true" ]; then
            echo "✅ Updated :rc tags to point to ${TAG} for both server and agent images."
          else
            echo "✅ Updated :latest, :${MAJOR_MINOR}, :${MAJOR} tags to point to ${TAG} for both server and agent images."
          fi
