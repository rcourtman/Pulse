<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pulse Account</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style nonce="{{.Nonce}}">{{.Styles}}</style>
</head>
<body>
<header>
  <span class="brand">Pulse Account</span>
  <div class="user-info" id="portal-user-info"></div>
</header>

<script id="pulse-account-bootstrap" type="application/json">{{.BootstrapJSON}}</script>

<main class="main">
  <div id="portal-app-root"></div>
</main>

<div class="toast" id="toast"></div>

<script nonce="{{.Nonce}}">{{.ShellScript}}</script>
</body>
</html>
