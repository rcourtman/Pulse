<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pulse Account — Sign In</title>
  <style nonce="{{.Nonce}}">{{.Styles}}</style>
</head>
<body>
<div class="card">
  <div class="brand">Pulse Account</div>
  <div class="subtitle">Sign in to manage Cloud workspaces, MSP access, and commercial account services.</div>
  <label for="email">Email address</label>
  <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
  <button class="cta" id="send-btn">Send magic link</button>
  <div class="success" id="success">
    Magic link sent! Check your inbox and click the link to sign in.
    <br><br>
    <strong>Don't see it?</strong> Check your spam folder, or <a href="#" id="resend-link">send a new link</a>.
  </div>
  <div class="error" id="err-msg"></div>
  <div class="footer">
    New here? <a href="/signup">Create an account</a>
  </div>
</div>
<script nonce="{{.Nonce}}">{{.Script}}</script>
</body>
</html>
