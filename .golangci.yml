run:
  timeout: 5m
  tests: true
linters:
  disable-all: true
  enable:
    - govet
    - gofmt
    - goimports
    - errcheck
    - dupl
issues:
  max-same-issues: 0
  max-issues-per-linter: 0
  # tmp/ is gitignored scratch (dev-mode module/toolchain caches live there);
  # ./... must not typecheck it.
  exclude-dirs:
    - tmp
  exclude-rules:
    # Exclude dupl findings in test files and mock generators — test boilerplate
    # is inherently repetitive and mock data generators share patterns by design.
    - linters: [dupl]
      path: "_test\\.go$"
    - linters: [dupl]
      path: "internal/mock/"
    # Platform mock fixture catalogs outside internal/mock/ are the same
    # category: explicit literal fixture records that deliberately share shape.
    - linters: [dupl]
      path: "internal/vmware/fixtures\\.go$"
linters-settings:
  gofmt:
    simplify: true
  errcheck:
    exclude-functions:
      - (*encoding/json.Encoder).Encode
      - (net/http.ResponseWriter).Write
  dupl:
    threshold: 150
