<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pulse Monitoring Prototype v2</title>
    <style>
      :root {
        --bg: #0d1627;
        --surface: #172236;
        --surface-soft: #24334b;
        --surface-row: #18243a;
        --section: #101a2b;
        --line: #33445d;
        --line-strong: #52677f;
        --text: #e8eef8;
        --muted: #9aa8bd;
        --blue: #5aa2ff;
        --green: #36c275;
        --amber: #f2b84b;
        --red: #ef6f61;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 12px/1.25 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        border-radius: 4px;
        padding: 5px 9px;
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover,
      button.active {
        border-color: var(--blue);
        background: #123159;
        color: var(--blue);
      }

      button[aria-disabled="true"] {
        cursor: default;
      }

      .page {
        max-width: 1720px;
        margin: 0 auto;
        padding: 12px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 8px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 21px;
        letter-spacing: 0;
      }

      .subtitle {
        margin-top: 3px;
        color: var(--muted);
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(6, minmax(130px, 1fr));
        gap: 8px;
        margin-bottom: 8px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 6px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
      }

      .summary-card {
        padding: 7px 10px;
      }

      .label {
        color: var(--muted);
        font-size: 11px;
      }

      .big-number {
        display: flex;
        align-items: baseline;
        gap: 6px;
        margin-top: 3px;
        font-size: 20px;
        font-weight: 750;
      }

      .note {
        color: var(--muted);
        font-size: 11px;
      }

      .toolbar {
        display: grid;
        gap: 6px;
        padding: 8px;
        margin-bottom: 8px;
      }

      .toolbar input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 6px 9px;
        background: #111c2f;
        color: var(--text);
      }

      .filter-row {
        display: flex;
        align-items: center;
        gap: 7px;
        flex-wrap: wrap;
      }

      .filter-label {
        width: 76px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .filter-buttons {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .table-card {
        overflow: hidden;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        min-width: 1480px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        height: 25px;
        padding: 3px 8px;
        vertical-align: middle;
        text-align: left;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--surface-soft);
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      tbody tr {
        background: var(--surface-row);
      }

      tbody tr:hover {
        background: #203454;
      }

      tr.section-row td {
        height: 30px;
        padding: 5px 8px;
        background: var(--section);
        border-top: 2px solid var(--line-strong);
        border-bottom: 1px solid #32435a;
      }

      tr.section-row.platform td {
        height: 31px;
        background: var(--surface-soft);
      }

      tr.section-row.top td {
        height: 28px;
        background: #111d31;
        border-top: 1px solid var(--line-strong);
      }

      tr.section-row.lane td {
        height: 22px;
        padding-left: 28px;
        background: #152136;
        border-top: 1px solid #2a3a52;
      }

      tr.section-row.group td {
        height: 25px;
        background: #142033;
        border-top: 1px solid var(--line);
      }

      .section {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .section-mark {
        width: 4px;
        height: 15px;
        border-radius: 4px;
        background: var(--blue);
      }

      tr.section-row.group .section-mark {
        height: 12px;
        opacity: 0.72;
      }

      tr.section-row.top .section-mark {
        height: 14px;
        background: #8fb8e8;
        opacity: 0.8;
      }

      tr.section-row.lane .section-mark {
        width: 3px;
        height: 10px;
        background: #6f819b;
        opacity: 0.82;
      }

      .section-title {
        color: #e3ebf7;
        font-size: 11px;
        font-weight: 800;
        line-height: 1;
        text-transform: uppercase;
        white-space: nowrap;
      }

      tr.section-row.top .section-title {
        font-size: 12px;
        text-transform: none;
      }

      tr.section-row.lane .section-title {
        color: #c5d1df;
        font-size: 10px;
      }

      .section-meta {
        color: var(--muted);
        font-size: 10px;
        font-weight: 650;
        white-space: nowrap;
      }

      tr.data-row td {
        height: 25px;
        font-size: 11px;
      }

      tr.data-row.area-top td {
        height: 27px;
        background: #1a283f;
        font-size: 11.5px;
      }

      tr.data-row.area-workload td,
      tr.data-row.area-storage td,
      tr.data-row.area-recovery td {
        height: 23px;
      }

      tr.data-row.area-workload td:first-child,
      tr.data-row.area-storage td:first-child,
      tr.data-row.area-recovery td:first-child {
        padding-left: 22px;
      }

      tr.data-row.related-row td {
        height: 21px;
        background: #162238;
        color: #bdc8d6;
      }

      tr.data-row.related-row td:first-child {
        padding-left: 44px;
      }

      tr.data-row.related-row .name {
        font-weight: 650;
      }

      tr.data-row.related-row .state-dot {
        width: 6px;
        height: 6px;
        opacity: 0.85;
      }

      .relation {
        flex: 0 0 auto;
        width: 42px;
        color: var(--muted);
        font-size: 9px;
        font-weight: 750;
        text-transform: uppercase;
      }

      .resource {
        display: flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
      }

      .state-dot {
        flex: 0 0 auto;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 0 1px rgba(54, 194, 117, 0.75);
      }

      .state-dot.state-issue {
        background: var(--amber);
        box-shadow: 0 0 0 1px rgba(242, 184, 75, 0.75);
      }

      .state-dot.state-off {
        background: var(--red);
        box-shadow: 0 0 0 1px rgba(239, 111, 97, 0.75);
      }

      .name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 720;
      }

      .subtle {
        color: var(--muted);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 9px;
        line-height: 1.15;
        white-space: nowrap;
      }

      .metric {
        display: grid;
        grid-template-columns: 31px minmax(0, 1fr);
        align-items: center;
        gap: 5px;
        min-width: 0;
      }

      .track {
        height: 5px;
        border-radius: 2px;
        background: #2d3b51;
        overflow: hidden;
      }

      .fill {
        height: 100%;
        border-radius: inherit;
        background: var(--green);
      }

      .fill.warning {
        background: var(--amber);
      }

      .fill.critical {
        background: var(--red);
      }

      .signals {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .signal-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 16px;
        height: 15px;
        border-radius: 3px;
        background: #2a3446;
        color: #d8e1ee;
        font-size: 10px;
        font-weight: 700;
      }

      tr.row-issue .signal-count {
        background: #3a2c12;
        color: var(--amber);
      }

      tr.row-off .signal-count {
        background: #44201d;
        color: var(--red);
      }

      .signal-text {
        display: block;
        max-width: 230px;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #c6d0df;
        white-space: nowrap;
      }

      .empty-state {
        padding: 28px;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <h1>Monitoring v2</h1>
          <p class="subtitle">Dense unified table with platform, resource, and operational lane segmentation.</p>
        </div>
      </header>

      <section class="summary" aria-label="Monitoring summary">
        <article class="card summary-card">
          <div class="label">Platforms</div>
          <div class="big-number"><span id="platformCount">0</span><span class="note">supported</span></div>
        </article>
        <article class="card summary-card">
          <div class="label">Top Level</div>
          <div class="big-number"><span id="topLevelCount">0</span><span class="note">resources</span></div>
        </article>
        <article class="card summary-card">
          <div class="label">Workloads</div>
          <div class="big-number"><span id="workloadCount">0</span><span class="note">guests, pods, containers</span></div>
        </article>
        <article class="card summary-card">
          <div class="label">Storage</div>
          <div class="big-number"><span id="storageCount">0</span><span class="note">items</span></div>
        </article>
        <article class="card summary-card">
          <div class="label">Recovery</div>
          <div class="big-number"><span id="recoveryCount">0</span><span class="note">policies</span></div>
        </article>
        <article class="card summary-card">
          <div class="label">Needs Attention</div>
          <div class="big-number"><span id="attentionCount">0</span><span class="note">resources</span></div>
        </article>
      </section>

      <section class="card toolbar" aria-label="Monitoring controls">
        <input id="search" type="search" placeholder="Search resources, platforms, hosts, guests, storage, backup jobs..." />
        <div class="filter-row">
          <span class="filter-label">Platform</span>
          <div id="platformButtons" class="filter-buttons"></div>
        </div>
        <div class="filter-row">
          <span class="filter-label">Focus</span>
          <div id="viewButtons" class="filter-buttons"></div>
        </div>
        <div class="filter-row">
          <span class="filter-label">Include</span>
          <div id="layerButtons" class="filter-buttons"></div>
        </div>
      </section>

      <article class="card table-card">
        <div class="table-wrap">
          <table>
            <colgroup id="cols"></colgroup>
            <thead id="head"></thead>
            <tbody id="body"></tbody>
          </table>
          <div id="empty" class="empty-state" hidden>No resources match this view.</div>
        </div>
      </article>
    </main>

      const state = {
        view: "overview",
        selectedPlatforms: new Set(),
        layers: new Set(focusOptions[0].layers),
        query: "",
      };

      function platformIds() {
        return Object.keys(data);
      }

      function focusOption(view) {
        return focusOptions.find((option) => option.id === view) || focusOptions[0];
      }

      function primaryLayerForView(view) {
        if (view === "hosts") return "top";
        if (view === "workloads") return "workload";
        if (view === "storage") return "storage";
        if (view === "recovery") return "recovery";
        return "";
      }

      function applyFocusDefaults(view) {
        state.view = view;
        state.layers = new Set(focusOption(view).layers);
      }

      function ensureFocusState() {
        if (!focusOptions.some((option) => option.id === state.view)) {
          applyFocusDefaults("overview");
          return;
        }
        const primary = primaryLayerForView(state.view);
        if (primary) state.layers.add(primary);
        if (state.layers.size === 0) applyFocusDefaults("overview");
      }

      function layerEnabled(layer) {
        return state.layers.has(layer);
      }

      function selectedPlatformIds() {
        return state.selectedPlatforms.size ? Array.from(state.selectedPlatforms) : platformIds();
      }

      function focusedPlatformScope() {
        if (state.selectedPlatforms.size !== 1) return "";
        return Array.from(state.selectedPlatforms)[0];
      }

      function allRows(platformId) {
        const platform = data[platformId];
        return [
          ...platform.top.map((row) => normalizeRow(platformId, "top", row)),
          ...platform.workloads.map((row) => normalizeRow(platformId, "workload", row)),
          ...platform.storage.map((row) => normalizeRow(platformId, "storage", row)),
          ...platform.backups.map((row) => normalizeRow(platformId, "recovery", row)),
        ];
      }

      function normalizeRow(platformId, area, row) {
        const recoveryInfo = area === "recovery"
          ? [row.target, row.lastRun, row.verification].filter(Boolean).join(" / ")
          : "";
        const runtimeState = resolveRuntimeState(row);
        return {
          ...row,
          info: row.info || recoveryInfo,
          runtimeState: runtimeState.id,
          runtimeStateLabel: runtimeState.label,
          platform: platformId,
          platformLabel: data[platformId].label,
          area,
          signal: (row.signals || [])[0] || "None",
        };
      }

      function resolveRuntimeState(row) {
        if (row.state === "off" || row.status === "offline") return { id: "off", label: "Off" };
        if (row.state === "on" || row.status === "ok") {
          if ((row.signals || []).length > 0) return { id: "issue", label: "Issue" };
          return { id: "on", label: "On" };
        }
        return { id: "issue", label: "Issue" };
      }

      function hasProblem(row) {
        return row.runtimeState === "off" || row.runtimeState === "issue" || row.status === "critical" || row.status === "warning" || (row.signals || []).length > 0;
      }

      function matchesSearch(row) {
        if (!state.query) return true;
        return [row.name, row.kind, row.info, row.placement, row.platformLabel, row.status, row.runtimeStateLabel, row.recovery, row.target, row.lastRun, row.verification, ...(row.signals || [])]
          .join(" ")
          .toLowerCase()
          .includes(state.query);
      }

      function section(title, meta = "", level = "group") {
        return { section: true, title, meta, level };
      }

      function rowsForScope() {
        const focusedPlatform = focusedPlatformScope();
        if (focusedPlatform) return platformRows(focusedPlatform);
        return globalRows();
      }

      function globalRows() {
        if (state.view === "overview") return segmentedOverviewRows(selectedPlatformIds(), true);
        if (state.view === "problems") return globalProblemRows();
        if (state.view === "recovery") return recoveryRows();

        const rows = [];
        for (const platformId of selectedPlatformIds()) {
          const result = platformRows(platformId);
          if (!result.rows.length) continue;
          rows.push(section(data[platformId].label, "", "platform"), ...result.rows);
        }
        return { columns: columnsForFocus(), rows };
      }

      function topLevelRows(platformId) {
        const rows = data[platformId].top
          .map((row) => normalizeRow(platformId, "top", row))
          .filter(matchesSearch);
        return { columns: columns.overview, rows };
      }

      function columnsForFocus() {
        if (state.view === "storage") return columns.storage;
        if (state.view === "recovery") return columns.backups;
        if (state.view === "problems") return columns.problems;
        return columns.overview;
      }

      function segmentedOverviewRows(platforms, includePlatformSections) {
        const relationshipMode = true;
        const rows = [];
        for (const platformId of platforms) {
          const platform = data[platformId];
          const platformStart = rows.length;
          if (includePlatformSections) rows.push(section(platform.label, `${platform.top.length} ${platform.topLabel}`, "platform"));

          for (const top of platform.top) {
            appendTopOverviewRows(rows, platformId, top, relationshipMode);
          }

          if (includePlatformSections && rows.length === platformStart + 1) rows.splice(platformStart, 1);
        }
        return { columns: columns.overview, rows };
      }

      function appendTopOverviewRows(rows, platformId, top, relationshipMode) {
        if (relationshipMode) {
          appendRelationshipOverviewRows(rows, platformId, top);
          return;
        }

        const topRow = normalizeRow(platformId, "top", top);
        const lanes = overviewLanes(platformId, top).map((lane) => ({
          ...lane,
          rows: lane.rows.filter(matchesSearch),
        }));
        const hasVisibleChildren = lanes.some((lane) => lane.rows.length > 0);
        if (state.query && !matchesSearch(topRow) && !hasVisibleChildren) return;

        rows.push(section(top.name, top.info, "top"));
        rows.push(topRow);

        for (const lane of lanes) {
          if (!lane.rows.length) continue;
          rows.push(section(lane.title, lane.meta, `lane lane-${lane.id}`), ...lane.rows);
        }
      }

      function appendRelationshipOverviewRows(rows, platformId, top) {
        const topRow = normalizeRow(platformId, "top", top);
        const model = relationshipModel(platformId, top);
        const visibleWorkloads = layerEnabled("workload")
          ? model.workloads
            .map((entry) => visibleWorkloadEntry(entry, layerEnabled("storage"), layerEnabled("recovery")))
            .filter(Boolean)
          : [];
        const visibleHostStorage = layerEnabled("storage") ? visibleRowsForSearch(model.hostStorage) : [];
        const visibleHostRecovery = layerEnabled("recovery") ? visibleRowsForSearch(model.hostRecovery) : [];
        const hasVisibleChildren = visibleWorkloads.length || visibleHostStorage.length || visibleHostRecovery.length;
        if ((state.query || !layerEnabled("top")) && !matchesSearch(topRow) && !hasVisibleChildren) return;

        rows.push(section(top.name, top.info, "top"));
        if (layerEnabled("top")) rows.push(topRow);

        if (visibleWorkloads.length) {
          const workloadCount = model.workloads.length;
          rows.push(section("Workloads", laneMeta(model.workloads.map((entry) => entry.workload), "resource"), "lane lane-workload"));
          for (const entry of visibleWorkloads) {
            rows.push(entry.workload, ...entry.storage, ...entry.recovery);
          }
        }

        if (visibleHostStorage.length) {
          rows.push(section("Host Storage", laneMeta(model.hostStorage, "item"), "lane lane-storage"), ...visibleHostStorage);
        }

        if (visibleHostRecovery.length) {
          rows.push(section("Recovery", laneMeta(model.hostRecovery, "policy"), "lane lane-recovery"), ...visibleHostRecovery);
        }
      }

      function relationshipModel(platformId, top) {
        const platform = data[platformId];
        const byTop = (row) => belongsToTop(row, top.name);
        const workloads = platform.workloads.filter(byTop).map((row) => normalizeRow(platformId, "workload", row));
        const storage = platform.storage.filter(byTop).map((row) => normalizeRow(platformId, "storage", row));
        const recovery = platform.backups.map((row) => normalizeRow(platformId, "recovery", row)).filter(byTop);
        const assignedStorage = new Set();
        const assignedRecovery = new Set();
        const workloadEntries = workloads.map((workload) => {
          const relatedStorage = storage
            .filter((row) => !assignedStorage.has(row) && relatesToWorkload(row, workload))
            .map((row) => markRelated(row, "storage"));
          relatedStorage.forEach((row) => assignedStorage.add(row.sourceRow));

          const relatedRecovery = recovery
            .filter((row) => !assignedRecovery.has(row) && relatesToWorkload(row, workload))
            .map((row) => markRelated(row, "backup"));
          relatedRecovery.forEach((row) => assignedRecovery.add(row.sourceRow));

          return { workload, storage: relatedStorage, recovery: relatedRecovery };
        });

        return {
          workloads: workloadEntries,
          hostStorage: storage.filter((row) => !assignedStorage.has(row)),
          hostRecovery: recovery.filter((row) => !assignedRecovery.has(row)),
        };
      }

      function visibleWorkloadEntry(entry, includeStorage = true, includeRecovery = true) {
        const matchingStorage = includeStorage ? visibleRowsForSearch(entry.storage) : [];
        const matchingRecovery = includeRecovery ? visibleRowsForSearch(entry.recovery) : [];
        const workloadMatches = matchesSearch(entry.workload);
        if (state.query && !workloadMatches && !matchingStorage.length && !matchingRecovery.length) return null;
        return {
          workload: entry.workload,
          storage: state.query && !workloadMatches ? matchingStorage : includeStorage ? entry.storage : [],
          recovery: state.query && !workloadMatches ? matchingRecovery : includeRecovery ? entry.recovery : [],
        };
      }

      function visibleRowsForSearch(rows) {
        return state.query ? rows.filter(matchesSearch) : rows;
      }

      function markRelated(row, relation) {
        return {
          ...row,
          related: true,
          relation,
          sourceRow: row,
        };
      }

      function relatesToWorkload(row, workload) {
        const text = [row.name, row.placement, row.info, row.target, row.recovery].join(" ").toLowerCase();
        return relationshipKeys(workload).some((key) => text.includes(key));
      }

      function relationshipKeys(row) {
        const values = [row.name].filter(Boolean).map((value) => String(value).toLowerCase());
        const keys = new Set();
        const add = (value) => {
          const cleaned = String(value || "").trim().toLowerCase();
          if (cleaned.length >= 3) keys.add(cleaned);
        };
        for (const value of values) {
          add(value);
          value.split(/[\s/:-]+/).forEach(add);
          add(value.split(" ")[0]);
          add(value.split("/").pop());
        }
        const vmid = values.join(" ").match(/vmid\s+(\d+)/);
        if (vmid) {
          add(`vm-${vmid[1]}`);
          add(`ct-${vmid[1]}`);
          add(vmid[1]);
        }
        return Array.from(keys).filter((key) => !["pod", "vm", "ct", "lxc", "qemu", "vmid", "container", "deployment", "image", "guest"].includes(key));
      }

      function overviewLanes(platformId, top) {
        const platform = data[platformId];
        const byTop = (row) => belongsToTop(row, top.name);
        const workloads = platform.workloads.filter(byTop).map((row) => normalizeRow(platformId, "workload", row));
        const storage = platform.storage.filter(byTop).map((row) => normalizeRow(platformId, "storage", row));
        const recovery = platform.backups.map((row) => normalizeRow(platformId, "recovery", row)).filter(byTop);
        return [
          { id: "workload", title: "Workloads", meta: laneMeta(workloads, "resource"), rows: workloads },
          { id: "storage", title: "Storage", meta: laneMeta(storage, "item"), rows: storage },
          { id: "recovery", title: "Recovery", meta: laneMeta(recovery, "policy"), rows: recovery },
        ];
      }

      function laneMeta(rows, noun) {
        return `${rows.length} ${rows.length === 1 ? noun : `${noun}s`}`;
      }

      function platformRows(platformId) {
        if (state.view === "overview") return segmentedOverviewRows([platformId], false);
        if (state.view === "hosts") return topLevelRows(platformId);
        if (state.view === "workloads") return workloadIntentRows(platformId);
        if (state.view === "storage") return storageIntentRows(platformId);
        if (state.view === "recovery") return recoveryIntentRows(platformId);
        if (state.view === "problems") return problemIntentRows(platformId);
        return segmentedOverviewRows([platformId], false);
      }

      function workloadIntentRows(platformId) {
        const rows = [];
        for (const top of data[platformId].top) {
          const topRow = normalizeRow(platformId, "top", top);
          const model = relationshipModel(platformId, top);
          const entries = model.workloads
            .filter((entry) => workloadMatchesIntent(entry.workload))
            .map((entry) => visibleWorkloadEntry(entry, layerEnabled("storage"), layerEnabled("recovery")))
            .filter(Boolean);
          if (state.query && !matchesSearch(topRow) && !entries.length) continue;

          rows.push(section(top.name, top.info, "top"), topRow);
          if (!layerEnabled("top")) rows.pop();
          if (!entries.length) continue;
          rows.push(section("Workloads", laneMeta(entries.map((entry) => entry.workload), "resource"), "lane lane-workload"));
          for (const entry of entries) rows.push(entry.workload, ...entry.storage, ...entry.recovery);
        }
        return { columns: columns.overview, rows };

      function storageIntentRows(platformId) {
        const rows = [];
        for (const top of data[platformId].top) {
          const topRow = normalizeRow(platformId, "top", top);
          const model = relationshipModel(platformId, top);
          const guestStorage = model.workloads
            .map((entry) => ({
              workload: entry.workload,
              storage: visibleRowsForSearch(entry.storage.filter(storageMatchesIntent)),
            }))
            .filter((entry) => entry.storage.length > 0 || (state.query && matchesSearch(entry.workload)));
          const hostStorage = visibleRowsForSearch(model.hostStorage.filter(storageMatchesIntent));
          if (state.query && !matchesSearch(topRow) && !guestStorage.length && !hostStorage.length) continue;

          rows.push(section(top.name, top.info, "top"), topRow);

          if (guestStorage.length) {

            for (const entry of guestStorage) rows.push(...(layerEnabled("workload") ? [entry.workload] : []), ...entry.storage);

        }
        return { columns: columns.storage, rows };

      function recoveryIntentRows(platformId) {
        const rows = [];
        for (const top of data[platformId].top) {
          const topRow = normalizeRow(platformId, "top", top);
          const model = relationshipModel(platformId, top);
          const protectedWorkloads = model.workloads
            .map((entry) => ({
              workload: entry.workload,
              recovery: visibleRowsForSearch(entry.recovery.filter(recoveryMatchesIntent)),
            }))
            .filter((entry) => entry.recovery.length > 0 || (state.query && matchesSearch(entry.workload)));
          const hostRecovery = visibleRowsForSearch(model.hostRecovery.filter(recoveryMatchesIntent));
          if (state.query && !matchesSearch(topRow) && !protectedWorkloads.length && !hostRecovery.length) continue;

          rows.push(section(top.name, top.info, "top"), topRow);
          if (!layerEnabled("top")) rows.pop();
          if (protectedWorkloads.length) {
            rows.push(section("Protected Workloads", laneMeta(protectedWorkloads.flatMap((entry) => entry.recovery), "policy"), "lane lane-recovery"));
            for (const entry of protectedWorkloads) rows.push(...(layerEnabled("workload") ? [entry.workload] : []), ...entry.recovery);
          }
          if (hostRecovery.length) rows.push(section("Host Recovery", laneMeta(hostRecovery, "policy"), "lane lane-recovery"), ...hostRecovery);
        }
        return { columns: columns.backups, rows };
      }

      function problemIntentRows(platformId) {
        const rows = [];
        for (const top of data[platformId].top) {
          const topRow = normalizeRow(platformId, "top", top);
          const model = relationshipModel(platformId, top);
          const affectedWorkloads = model.workloads
            .map((entry) => {
              const relatedProblems = [
                ...(layerEnabled("storage") ? entry.storage : []),
                ...(layerEnabled("recovery") ? entry.recovery : []),
              ].filter(hasProblem);
              const includeWorkload = (layerEnabled("workload") && hasProblem(entry.workload)) || relatedProblems.length > 0;
              if (!includeWorkload) return null;
              return { workload: entry.workload, related: relatedProblems };
            })
            .filter(Boolean)
            .map((entry) => ({
              workload: entry.workload,
              related: visibleRowsForSearch(entry.related),
            }))
            .filter((entry) => !state.query || matchesSearch(entry.workload) || entry.related.length > 0);
          const hostStorage = layerEnabled("storage") ? visibleRowsForSearch(model.hostStorage.filter(hasProblem)) : [];
          const hostRecovery = layerEnabled("recovery") ? visibleRowsForSearch(model.hostRecovery.filter(hasProblem)) : [];
          const hasTopProblem = layerEnabled("top") && hasProblem(topRow);
          if (state.query && !matchesSearch(topRow) && !affectedWorkloads.length && !hostStorage.length && !hostRecovery.length) continue;
          if (!hasTopProblem && !affectedWorkloads.length && !hostStorage.length && !hostRecovery.length) continue;

          rows.push(section(top.name, top.info, "top"), topRow);
          if (!layerEnabled("top")) rows.pop();
          if (affectedWorkloads.length) {
            rows.push(section("Affected Workloads", laneMeta(affectedWorkloads.map((entry) => entry.workload), "resource"), "lane lane-workload"));
            for (const entry of affectedWorkloads) rows.push(...(layerEnabled("workload") ? [entry.workload] : []), ...entry.related);
          }
          if (hostStorage.length) rows.push(section("Host Storage", laneMeta(hostStorage, "item"), "lane lane-storage"), ...hostStorage);
          if (hostRecovery.length) rows.push(section("Recovery", laneMeta(hostRecovery, "policy"), "lane lane-recovery"), ...hostRecovery);
        }
        return { columns: columns.overview, rows };
      }

      function globalProblemRows() {
        const rows = [];
        for (const platformId of selectedPlatformIds()) {
          const result = problemIntentRows(platformId);
          if (!result.rows.length) continue;
          rows.push(section(data[platformId].label, `${result.rows.filter((row) => !row.section).length} affected rows`, "platform"), ...result.rows);
        }
        return { columns: columns.overview, rows };
      }

      function workloadMatchesIntent(row) {
        return true;
      }

      function storageMatchesIntent(row) {
        return true;
      }

      function recoveryMatchesIntent(row) {
        return true;
      }

      function belongsToTop(row, topName) {
        const rootPlacement = (row.placement || "").split(" / ")[0];
        if (rootPlacement === topName) return true;
        const text = [row.name, row.target, row.placement, row.info].join(" ").toLowerCase();
        return text.includes(topName.toLowerCase());
      }

      function recoveryRows() {
        const rows = [];
        for (const platformId of selectedPlatformIds()) {
          const platform = data[platformId];
          const backups = platform.backups.map((row) => normalizeRow(platformId, "recovery", row)).filter(matchesSearch);
          if (!backups.length) continue;
          rows.push(section(platform.label, `${backups.length} policies`, "platform"), ...backups);
        }
        return { columns: columns.backups, rows };
      }

      function metricCell(value) {
        if (value === null || value === undefined) return '<span class="subtle">-</span>';
        const tone = value >= 90 ? "critical" : value >= 75 ? "warning" : "";
        return `
          <div class="metric">
            <strong>${value}%</strong>
            <div class="track"><div class="fill ${tone}" style="width:${Math.max(0, Math.min(100, value))}%"></div></div>
          </div>
        `;
      }

      function signalsCell(row) {
        const signals = row.signals || [];
        if (!signals.length) return '<span class="subtle">None</span>';
        const suffix = signals.length > 1 ? ` +${signals.length - 1}` : "";
        return `
          <div class="signals">
            <span class="signal-count">${signals.length}</span>
            <span class="signal-text">${escapeHtml(signals[0])}${suffix}</span>
          </div>
        `;
      }

      function cell(row, col) {
        if (col.type === "resource") {
          return `
            <div class="resource">
              <span class="state-dot state-${escapeHtml(row.runtimeState)}" title="${escapeHtml(row.runtimeStateLabel)}"></span>
              ${row.relation ? `<span class="relation">${escapeHtml(row.relation)}</span>` : ""}
              <span class="name">${escapeHtml(row[col.key] || "")}</span>
            </div>
          `;
        }
        if (col.type === "metric") return metricCell(row[col.key]);
        if (col.type === "signals") return signalsCell(row);
        return escapeHtml(row[col.key] ?? "-");
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderControls() {
        ensureFocusState();

        document.getElementById("platformButtons").innerHTML = [
          `<button class="platform ${state.selectedPlatforms.size === 0 ? "active" : ""}" type="button" data-platform="any">All Platforms</button>`,
          ...platformIds().map((id) => `<button class="platform ${state.selectedPlatforms.has(id) ? "active" : ""}" type="button" data-platform="${id}">${data[id].label}</button>`),
        ].join("");

        document.getElementById("viewButtons").innerHTML = focusOptions
          .map((view) => `<button class="view ${state.view === view.id ? "active" : ""}" type="button" data-view="${view.id}">${view.label}</button>`)
          .join("");

        const primaryLayer = primaryLayerForView(state.view);
        document.getElementById("layerButtons").innerHTML = layerOptions
          .map((layer) => {
            const active = layerEnabled(layer.id);
            const required = primaryLayer === layer.id;
            return `<button class="layer ${active ? "active" : ""}" type="button" data-layer="${layer.id}" aria-pressed="${active}" ${required ? 'aria-disabled="true"' : ""}>${layer.label}</button>`;
          })
          .join("");
      }

      function renderTable() {
        const result = rowsForScope();
        const visibleRows = result.rows;
        document.getElementById("cols").innerHTML = result.columns.map((col) => `<col style="width:${col.width}px" />`).join("");
        document.getElementById("head").innerHTML = `<tr>${result.columns.map((col) => `<th>${col.label}</th>`).join("")}</tr>`;
        document.getElementById("body").innerHTML = visibleRows
          .map((row) => {
            if (row.section) {
              return `
                <tr class="section-row ${escapeHtml(row.level || "group")}">
                  <td colspan="${result.columns.length}">
                    <div class="section">
                      <span class="section-mark"></span>
                      <span class="section-title">${escapeHtml(row.title)}</span>
                      <span class="section-meta">${escapeHtml(row.meta)}</span>
                    </div>
                  </td>
                </tr>
              `;
            }
            const classes = [
              "data-row",
              `row-${escapeHtml(row.runtimeState)}`,
              `area-${escapeHtml(row.area || "unknown")}`,
              row.related ? "related-row" : "",
            ].filter(Boolean).join(" ");
            return `<tr class="${classes}">${result.columns.map((col) => `<td>${cell(row, col)}</td>`).join("")}</tr>`;
          })
          .join("");
        document.getElementById("empty").hidden = visibleRows.length > 0;
      }

      function renderSummary() {
        const rows = platformIds().flatMap(allRows);
        document.getElementById("platformCount").textContent = platformIds().length;
        document.getElementById("topLevelCount").textContent = platformIds().reduce((count, id) => count + data[id].top.length, 0);
        document.getElementById("workloadCount").textContent = platformIds().reduce((count, id) => count + data[id].workloads.length, 0);
        document.getElementById("storageCount").textContent = platformIds().reduce((count, id) => count + data[id].storage.length, 0);
        document.getElementById("recoveryCount").textContent = platformIds().reduce((count, id) => count + data[id].backups.length, 0);
        document.getElementById("attentionCount").textContent = rows.filter(hasProblem).length;
      }

      function render() {
        renderSummary();
        renderControls();
        renderTable();
        bindControls();
      }

      function bindControls() {
        document.querySelectorAll(".platform").forEach((button) => {
          button.addEventListener("click", () => {
            const platform = button.dataset.platform;
            if (platform === "any") {
              state.selectedPlatforms.clear();
            } else if (state.selectedPlatforms.has(platform)) {
              state.selectedPlatforms.delete(platform);
            } else {
              state.selectedPlatforms.add(platform);
            }
            render();
          });
        });
        document.querySelectorAll(".view").forEach((button) => {
          button.addEventListener("click", () => {
            applyFocusDefaults(button.dataset.view);
            render();
          });
        });
        document.querySelectorAll(".layer").forEach((button) => {
          button.addEventListener("click", () => {
            const layer = button.dataset.layer;
            if (primaryLayerForView(state.view) === layer) return;
            if (state.layers.has(layer) && state.layers.size > 1) {
              state.layers.delete(layer);
            } else {
              state.layers.add(layer);
            }
            ensureFocusState();
            render();
          });
        });
      }

      document.getElementById("search").addEventListener("input", (event) => {
        state.query = event.currentTarget.value.trim().toLowerCase();
        renderTable();
      });

      render();
    </script>
  </body>
</html>
